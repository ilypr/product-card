<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Product preview card component</title>
    <!--Google fornt fot the naming-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
    <!-- Google font for the text-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="product-design.css" />
  </head>
  <body>
    <main>
      <div class="main-container">
        <section>
        <picture class="image-mobile-styling">
        <source media="(min-width: 1024px)" srcset="images/image-product-desktop.jpg"/>
        <img src="images/image-product-mobile.jpg" alt="parfume"/>
      </picture>
      </section>
      <section class="text-container">
      <h1>PERFUME</h1>
      <h2>Gabrielle Essence Eau De Parfum</h2>
        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
      <div class="cost">
        <div class="pricing-row">
        <h3>$149.99</h3>
        <p class="old-price">$169.99</p>
        </div>
        <div class="cart-button-position">
        <a href="#" target="_blank" class="cart-button-styling"><span><img src="images/icon-cart.svg" alt="icon-cart"/></span>Add to cart</a>
        </div>
        </section>
        </div>
      </div>
    </main>
  </body>
</html>
